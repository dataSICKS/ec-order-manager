<!DOCTYPE html>
<html lang="ja">                                                                                                          
<head>                                                                                                                  
  <meta charset="UTF-8">                                                                                                  
  <meta name="viewport" content="width=device-width, initial-scale=1">                                                  
  <title>EC Order Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .sidebar { min-height: 100vh; background: #1a1a2e; }
    .sidebar .nav-link { color: #adb5bd; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,0.1); border-radius:
6px; }
    .sidebar .brand { color: #fff; font-weight: bold; font-size: 1.1rem; }
  </style>
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 sidebar px-3 py-4">
      <div class="brand mb-4"><i class="bi bi-box-seam me-2"></i>EC Manager</div>
      <ul class="nav flex-column gap-1">
        <li class="nav-item">
          <a class="nav-link {% if active == 'dashboard' %}active{% endif %}" href="/">
            <i class="bi bi-speedometer2 me-2"></i>ダッシュボード
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active == 'address_errors' %}active{% endif %}" href="/orders/address-errors">
            <i class="bi bi-geo-alt me-2"></i>住所不備
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active == 'credit_failures' %}active{% endif %}" href="/orders/credit-failures">
            <i class="bi bi-credit-card me-2"></i>与信落ち
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active == 'duplicates' %}active{% endif %}" href="/orders/duplicates">
            <i class="bi bi-files me-2"></i>重複注文
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if active == 'test_orders' %}active{% endif %}" href="/orders/test-orders">
            <i class="bi bi-bug me-2"></i>テスト受注
          </a>
        </li>
        <li class="nav-item mt-3">
          <a class="nav-link {% if active == 'batches' %}active{% endif %}" href="/batches/">
            <i class="bi bi-gear me-2"></i>バッチ処理
          </a>
        </li>
      </ul>
    </nav>
    <main class="col-md-10 py-4 px-4">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
